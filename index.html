<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebTrial | Private Legal Workspace</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="game-header">
        <div id="game-area">
            <div class="game-sidebar">
                <h2>Objection Training</h2>
                <div class="score-pill">Score: <span id="score">0</span></div>
                <button id="start-btn" onclick="initObjectionGame()">Start Session</button>
            </div>
            <div id="quiz-content">
                <p id="scenario-text">Practice universal rules of evidence and procedure.</p>
                <div id="options-grid"></div>
            </div>
        </div>
    </header>

    <main class="case-container">
        <section class="sidebar">
            <h2>Witnesses</h2>
            <div id="witness-list"></div>
            <button class="action-btn" onclick="addWitnessPrompt()">+ Add Witness</button>
            <h2>Arguments</h2>
            <div id="argument-tree"></div>
        </section>

        <section class="timeline-pane">
            <div class="header-row">
                <h2>Timeline</h2>
                <div class="toolbar">
                    <button onclick="document.getElementById('file-input').click()">📂 Import JSON</button>
                    <input type="file" id="file-input" style="display:none" onchange="importCase(event)">
                    <button onclick="exportCase()">💾 Export</button>
                </div>
            </div>
            <div id="timeline-view"></div>
        </section>

        <section class="preview-pane">
            <div id="cross-exam-section" style="display:none;">
                <h2 id="cross-header">Notes</h2>
                <textarea id="cross-exam-notes" oninput="updateWitnessNotes(this.value)"></textarea>
            </div>
            <h2>Evidence Resolver</h2>
            <iframe id="viewer" name="viewer" src="about:blank"></iframe>
        </section>
    </main>

    <script src="app.js"></script>
    <script src="logic/objection_engine.js"></script>
</body>
</html>
