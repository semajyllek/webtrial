<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <title>WebTrial | Case Ledger</title>
</head>
<body>
    <header>
        <span>WEBTRIAL LEDGER</span>
        <nav><a href="game.html" style="color:#000; font-weight:bold;">[ PRACTICE OBJECTIONS ]</a></nav>
    </header>

    <main class="case-container">
        <section>
            <h2>WITNESSES</h2>
            <div id="witness-list"></div>
            <div id="argument-tree" style="margin-top:20px;"></div>
        </section>

        <section>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h2>TIMELINE</h2>
                <div>
                    <button onclick="document.getElementById('file-input').click()">IMPORT JSON</button>
                    <input type="file" id="file-input" style="display:none" onchange="importCase(event)">
                </div>
            </div>
            <div id="timeline-view"></div>
        </section>

        <section>
            <div id="cross-exam-section" style="display:none;">
                <h2 id="cross-header">NOTES</h2>
                <textarea id="cross-exam-notes" oninput="updateWitnessNotes(this.value)"></textarea>
            </div>
            <h2 style="margin-top:20px;">EVIDENCE</h2>
            <iframe id="viewer" style="width:100%; height:400px; border:1px solid #000;"></iframe>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
